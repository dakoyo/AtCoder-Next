name: Toolchain Multi-OS Integration Test

on:
  workflow_dispatch:
    inputs:
      languages:
        description: 'テストする言語 (スペース区切り, 例: cpp python rust)'
        required: true
        default: 'cpp python'

jobs:
  integration-test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript CLI
        run: npm run build

      - name: Pre-setup Windows environment
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          winget source update

      - name: Create Dummy Config File
        shell: bash
        run: |
          mkdir -p .atcoder-next
          cat << 'EOF' > .atcoder-next/config.json
          {
            "defaultLanguage": "cpp",
            "testDirName": "tests",
            "lang": "en",
            "languages": {
              "cpp": {
                "extension": "cpp",
                "templateDir": "templates/cpp",
                "build": "g++ -O2 -std=gnu++20 -o a.out main.cpp",
                "run": "./a.out",
                "submitFile": "main.cpp",
                "atcoderLanguage": "",
                "atcoderLanguageIdRegex": ""
              },
              "python": {
                "extension": "py",
                "templateDir": "templates/python",
                "build": "",
                "run": "python3 main.py",
                "submitFile": "main.py",
                "atcoderLanguage": "",
                "atcoderLanguageIdRegex": ""
              },
              "rust": {
                "extension": "rs",
                "templateDir": "templates/rust",
                "build": "rustc -O -o a.out main.rs",
                "run": "./a.out",
                "submitFile": "main.rs",
                "atcoderLanguage": "",
                "atcoderLanguageIdRegex": ""
              },
              "typescript": {
                "extension": "ts",
                "templateDir": "templates/typescript",
                "build": "",
                "run": "npx ts-node main.ts",
                "submitFile": "main.ts",
                "atcoderLanguage": "",
                "atcoderLanguageIdRegex": ""
              },
              "javascript": {
                "extension": "js",
                "templateDir": "templates/javascript",
                "build": "",
                "run": "node main.js",
                "submitFile": "main.js",
                "atcoderLanguage": "",
                "atcoderLanguageIdRegex": ""
              },
              "c": {
                "extension": "c",
                "templateDir": "templates/c",
                "build": "gcc -O2 -std=c11 -o a.out main.c",
                "run": "./a.out",
                "submitFile": "main.c",
                "atcoderLanguage": "",
                "atcoderLanguageIdRegex": ""
              }
            }
          }
          EOF

      - name: Create Mock Compiler Cache
        shell: bash
        run: |
          mkdir -p ~/.atcoder-next/cache
          cat << 'EOF' > ~/.atcoder-next/cache/compilers.json
          {
            "timestamp": 9999999999999,
            "compilers": [
              { "id": "5001", "name": "C++ 23 (GCC 15.2.0)" },
              { "id": "5002", "name": "C++ 23 (Clang 21.1.0)" },
              { "id": "5003", "name": "Python (3.13.7)" },
              { "id": "5004", "name": "Python (PyPy 3.10-v7.3.20)" },
              { "id": "5005", "name": "Rust (rustc 1.89.0)" },
              { "id": "5006", "name": "TypeScript 5.9 (Node.js 22.19.0)" },
              { "id": "5007", "name": "JavaScript (Node.js 22.19.0)" },
              { "id": "5008", "name": "C11 (GCC 14.2.0)" },
              { "id": "5009", "name": "C11 (Clang 21.1.0)" }
            ]
          }
          EOF

      - name: Run Toolchain Installation Test
        shell: bash
        run: |
          # node経由でビルド済みスクリプトを実行し、--yes で非対話型インストールを行う
          # ログを setup.log に保存しつつコンソールにも出力
          node dist/cli.js tools setup ${{ github.event.inputs.languages }} --yes 2>&1 | tee setup.log

      - name: Add Installed Tools to PATH
        shell: bash
        run: |
          # If Node 22.19.0 was installed via nvm (UNIX), add its bin directory to GITHUB_PATH
          if [ -d "$HOME/.nvm/versions/node/v22.19.0/bin" ]; then
            echo "$HOME/.nvm/versions/node/v22.19.0/bin" >> $GITHUB_PATH
            echo "Added $HOME/.nvm/versions/node/v22.19.0/bin to GITHUB_PATH"
          fi

      - name: Run Toolchain Doctor Test
        shell: bash
        run: |
          # doctorを非対話モード (--yes) で実行し、バージョンが正しく一致 (Match/Warning) しているか検証
          # インストールした言語のみを検証対象にする
          node dist/cli.js tools doctor ${{ github.event.inputs.languages }} --yes 2>&1 | tee doctor.log

      - name: Run Scaffolding, Compile, and Test Integration
        shell: bash
        run: |
          echo "=== Scaffolding, Compile and Test Integration ==="
          for lang in ${{ github.event.inputs.languages }}; do
            echo "Testing scaffolding and local compiler settings for: $lang"
            
            # config.json の defaultLanguage を一時的に $lang に書き換え
            node -e "
              const fs = require('fs');
              const conf = JSON.parse(fs.readFileSync('.atcoder-next/config.json', 'utf8'));
              conf.defaultLanguage = '$lang';
              fs.writeFileSync('.atcoder-next/config.json', JSON.stringify(conf, null, 2));
            "
            
            # 既存のコンテストディレクトリがあればクリーンアップ
            rm -rf practice
            
            # 1. 新しい問題 (practice a) を作成
            node dist/cli.js new practice a
            
            # 2. $lang 用の正解 (AC) コードを生成
            case "$lang" in
              cpp)
                echo '#include <iostream>' > practice/a/main.cpp
                echo '#include <string>' >> practice/a/main.cpp
                echo 'using namespace std;' >> practice/a/main.cpp
                echo 'int main() {' >> practice/a/main.cpp
                echo '    int a, b, c;' >> practice/a/main.cpp
                echo '    string s;' >> practice/a/main.cpp
                echo '    if (cin >> a >> b >> c >> s) {' >> practice/a/main.cpp
                echo '        cout << (a + b + c) << " " << s << endl;' >> practice/a/main.cpp
                echo '    }' >> practice/a/main.cpp
                echo '    return 0;' >> practice/a/main.cpp
                echo '}' >> practice/a/main.cpp
                ;;
              c)
                echo '#include <stdio.h>' > practice/a/main.c
                echo 'int main() {' >> practice/a/main.c
                echo '    int a, b, c;' >> practice/a/main.c
                echo '    char s[101];' >> practice/a/main.c
                echo '    if (scanf("%d %d %d %s", &a, &b, &c, s) == 4) {' >> practice/a/main.c
                echo '        printf("%d %s\n", a + b + c, s);' >> practice/a/main.c
                echo '    }' >> practice/a/main.c
                echo '    return 0;' >> practice/a/main.c
                echo '}' >> practice/a/main.c
                ;;
              python)
                echo 'import sys' > practice/a/main.py
                echo 'def main():' >> practice/a/main.py
                echo '    lines = sys.stdin.read().split()' >> practice/a/main.py
                echo '    if len(lines) >= 4:' >> practice/a/main.py
                echo '        a = int(lines[0])' >> practice/a/main.py
                echo '        b = int(lines[1])' >> practice/a/main.py
                echo '        c = int(lines[2])' >> practice/a/main.py
                echo '        s = lines[3]' >> practice/a/main.py
                echo '        print(f"{a+b+c} {s}")' >> practice/a/main.py
                echo "if __name__ == '__main__':" >> practice/a/main.py
                echo '    main()' >> practice/a/main.py
                ;;
              rust)
                echo 'use std::io::{self, Read};' > practice/a/main.rs
                echo 'fn main() {' >> practice/a/main.rs
                echo '    let mut buffer = String::new();' >> practice/a/main.rs
                echo '    io::stdin().read_to_string(&mut buffer).unwrap();' >> practice/a/main.rs
                echo '    let mut words = buffer.split_whitespace();' >> practice/a/main.rs
                echo '    let a: i32 = words.next().unwrap().parse().unwrap();' >> practice/a/main.rs
                echo '    let b: i32 = words.next().unwrap().parse().unwrap();' >> practice/a/main.rs
                echo '    let c: i32 = words.next().unwrap().parse().unwrap();' >> practice/a/main.rs
                echo '    let s = words.next().unwrap();' >> practice/a/main.rs
                echo '    println!("{} {}", a + b + c, s);' >> practice/a/main.rs
                echo '}' >> practice/a/main.rs
                ;;
              typescript)
                echo "import * as fs from 'fs';" > practice/a/main.ts
                echo 'function main() {' >> practice/a/main.ts
                echo "    const input = fs.readFileSync('/dev/stdin', 'utf8');" >> practice/a/main.ts
                echo '    const words = input.trim().split(/\s+/);' >> practice/a/main.ts
                echo '    if (words.length >= 4) {' >> practice/a/main.ts
                echo '        const a = parseInt(words[0], 10);' >> practice/a/main.ts
                echo '        const b = parseInt(words[1], 10);' >> practice/a/main.ts
                echo '        const c = parseInt(words[2], 10);' >> practice/a/main.ts
                echo '        const s = words[3];' >> practice/a/main.ts
                echo '        console.log(`${a + b + c} ${s}`);' >> practice/a/main.ts
                echo '    }' >> practice/a/main.ts
                echo '}' >> practice/a/main.ts
                echo 'main();' >> practice/a/main.ts
                ;;
              javascript)
                echo "const fs = require('fs');" > practice/a/main.js
                echo 'function main() {' >> practice/a/main.js
                echo '    const input = fs.readFileSync(0, "utf8");' >> practice/a/main.js
                echo '    const words = input.trim().split(/\s+/);' >> practice/a/main.js
                echo '    if (words.length >= 4) {' >> practice/a/main.js
                echo '        const a = parseInt(words[0], 10);' >> practice/a/main.js
                echo '        const b = parseInt(words[1], 10);' >> practice/a/main.js
                echo '        const c = parseInt(words[2], 10);' >> practice/a/main.js
                echo '        const s = words[3];' >> practice/a/main.js
                echo '        console.log(`${a + b + c} ${s}`);' >> practice/a/main.js
                echo '    }' >> practice/a/main.js
                echo '}' >> practice/a/main.js
                echo 'main();' >> practice/a/main.js
                ;;
            esac
            
            # 3. テストを実行し、すべてのテストケースがパスする (AC) か確かめる
            # test コマンドは、一部でも WA やエラーがあると非ゼロの終了コードを返すため、
            # 失敗時にはここでワークフロー全体がエラー終了します。
            node dist/cli.js test practice a
            
            echo "Successfully verified compile & test for $lang!"
          done

      - name: Verify Installed Tools (Bash)
        shell: bash
        run: |
          echo "=== Verification ==="
          for lang in ${{ github.event.inputs.languages }}; do
            echo "Verifying $lang..."
            if [ "$lang" = "cpp" ] || [ "$lang" = "c" ]; then
              g++ --version || clang++ --version || cl.exe
            elif [ "$lang" = "python" ]; then
              python3 --version || python --version || pypy3 --version
            elif [ "$lang" = "rust" ]; then
              rustc --version
            fi
          done

      - name: Copy Install Log to Workspace
        if: always()
        shell: bash
        run: |
          # 各OS共通のホームディレクトリパスから install.log をワークスペースにコピー
          if [ -f ~/.atcoder-next/install.log ]; then
            cp ~/.atcoder-next/install.log ./install.log
            echo "install.log copied successfully"
          else
            echo "No install.log found at ~/.atcoder-next/install.log"
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-logs-${{ matrix.os }}
          path: |
            setup.log
            doctor.log
            install.log
          if-no-files-found: ignore
